<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile — EduBase School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/school.css">
  <style>:root { --role-color:#3b82f6; --role-rgb:59,130,246; }</style>
</head>
<body>
  <div class="app-layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="school-logo">
        <div class="logo-icon">🎓</div>
        <div><div class="school-name">EduBase</div><div style="font-size:10px;color:var(--text-muted)">School System</div></div>
      </div>
      <div class="user-info">
        <div class="user-avatar">👩‍🎓</div>
        <div><div class="user-name">Riya Sharma</div><div class="user-role">Student</div></div>
      </div>
    </div>
    <nav class="sidebar-nav"><a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span>Dashboard</a>
<a href="subjects.html" class="nav-link"><span class="nav-icon">📚</span>My Subjects</a>
<a href="assignments.html" class="nav-link"><span class="nav-icon">📝</span>Assignments</a>
<a href="attendance.html" class="nav-link"><span class="nav-icon">🗓️</span>Attendance</a>
<a href="results.html" class="nav-link"><span class="nav-icon">🏆</span>Results</a>
<a href="learning-path.html" class="nav-link"><span class="nav-icon">🧭</span>Learning Path</a>
<a href="mock-tests.html" class="nav-link"><span class="nav-icon">📋</span>Mock Tests</a>
<a href="skill-profile.html" class="nav-link"><span class="nav-icon">🧬</span>Skill Profile</a>
<a href="achievements.html" class="nav-link"><span class="nav-icon">🏅</span>Achievements</a>
<a href="notifications.html" class="nav-link"><span class="nav-icon">🔔</span>Notifications</a>
<a href="profile.html" class="nav-link active"><span class="nav-icon">👤</span>My Profile</a>
</nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="showConfirm('Logout?','Are you sure you want to logout?',()=>{window.location.href='../index.html';})">🚪 Logout</button>
    </div>
  </aside>
    <main class="main-content">
    <div class="top-bar">
      <div><div class="page-title">Student Profile</div><div class="page-subtitle">Personal information</div></div>
      <div class="top-bar-right">
        <div class="search-bar"><span>🔍</span><input placeholder="Search..."></div>
        <button class="icon-btn" onclick="showInfo('Notifications','You have 3 new notifications.')">🔔</button>
        <button class="icon-btn">👤</button>
      </div>
    </div>
      <div class="bento-grid bento-3">
        <div class="card" style="text-align:center">
          <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">👩‍🎓</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:4px">Riya Sharma</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Class 10A | Roll No. 01</div>
          <span class="badge badge-success">Active Student</span>
        </div>
        <div class="card span-2">
          <div class="section-title" style="margin-bottom:16px">✏️ Edit Profile</div>
          <form onsubmit="event.preventDefault();showSuccess('Profile Updated!','Your changes have been saved.')">
            <div class="form-row"><div class="form-group"><label class="form-label">First Name</label><input class="form-control" value="Riya"></div><div class="form-group"><label class="form-label">Last Name</label><input class="form-control" value="Sharma"></div></div>
            <div class="form-row"><div class="form-group"><label class="form-label">Date of Birth</label><input type="date" class="form-control" value="2008-05-15"></div><div class="form-group"><label class="form-label">Phone</label><input class="form-control" value="+91 98765 43210"></div></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" value="riya.sharma@student.edubase.in"></div>
            <div class="form-group"><label class="form-label">Address</label><textarea class="form-control">123, Green Park, New Delhi - 110016</textarea></div>
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../js/popup.js"></script>
  <script src="../js/firebase-school.js"></script>
  <script src="../js/school-app.js"></script>
  <script></script>
</body>
</html>

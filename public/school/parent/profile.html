<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Profile — EduBase School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/school.css">
  <style>:root { --role-color:#f59e0b; --role-rgb:245,158,11; }</style>
</head>
<body>
  <div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="school-logo"><div class="logo-icon">🎓</div><div><div class="school-name">EduBase</div><div style="font-size:10px;color:var(--text-muted)">School System</div></div></div>
      <div class="user-info"><div class="user-avatar" style="font-size:13px;font-weight:700">P</div><div><div class="user-name">Mrs. Sunita Sharma</div><div class="user-role">Parent</div></div></div>
    </div>
    <nav class="sidebar-nav"><a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span>Dashboard</a><a href="child-performance.html" class="nav-link"><span class="nav-icon">📈</span>Child Performance</a><a href="attendance.html" class="nav-link"><span class="nav-icon">🗓️</span>Attendance</a><a href="fees.html" class="nav-link"><span class="nav-icon">💰</span>Fees Status</a><a href="notifications.html" class="nav-link"><span class="nav-icon">🔔</span>Notifications</a><a href="profile.html" class="nav-link  active"><span class="nav-icon">👤</span>My Profile</a></nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="showConfirm('Logout?','Are you sure?',()=>{window.location.href='../index.html';})">🚪 Logout</button></div>
  </aside>
    <main class="main-content">
    <div class="top-bar">
      <div><div class="page-title">Parent Profile</div><div class="page-subtitle">Personal info</div></div>
      <div class="top-bar-right"><div class="search-bar"><span>🔍</span><input placeholder="Search..."></div><button class="icon-btn" onclick="showInfo('Notifications','You have 3 new notifications.')">🔔</button><button class="icon-btn">👤</button></div>
    </div>

      <div class="bento-grid bento-3">
        <div class="card" style="text-align:center">
          <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">👩</div>
          <div style="font-size:20px;font-weight:700;margin-bottom:4px">Mrs. Sunita Sharma</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Parent of Riya Sharma</div>
          <span class="badge badge-info">Linked Account</span>
        </div>
        <div class="card span-2">
          <div class="section-title" style="margin-bottom:16px">Edit Profile</div>
          <form onsubmit="event.preventDefault();showSuccess('Saved!','Profile updated.')">
            <div class="form-row"><div class="form-group"><label class="form-label">First Name</label><input class="form-control" value="Sunita"></div><div class="form-group"><label class="form-label">Last Name</label><input class="form-control" value="Sharma"></div></div>
            <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" value="sunita.sharma@email.com"></div>
            <div class="form-group"><label class="form-label">Phone</label><input class="form-control" value="+91 98765 43211"></div>
            <div class="form-group"><label class="form-label">Relation</label><select class="form-control"><option>Mother</option><option>Father</option><option>Guardian</option></select></div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="../js/popup.js"></script>
  <script src="../js/firebase-school.js"></script>
  <script src="../js/school-app.js"></script>
  <script></script>
</body>
</html>

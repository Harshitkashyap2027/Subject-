<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – lvlBase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body class="mesh-bg">
  <div id="navbar-placeholder"></div>

  <main class="auth-page" style="padding-top:100px;">
    <div class="auth-card glass">
      <a href="./index.html" class="auth-logo">⚡ <span class="gradient-text">lvlBase</span></a>
      
      <div class="auth-header">
        <div style="font-size:3rem;margin-bottom:0.75rem;">🔐</div>
        <h1>Reset your password</h1>
        <p>Enter your email and we'll send you a link to reset your password.</p>
      </div>

      <div id="reset-alert" class="alert"></div>

      <form id="reset-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="reset-email">Email address</label>
          <input type="email" id="reset-email" class="form-input" placeholder="you@organization.com" autocomplete="email">
          <div class="form-error" id="reset-email-error"></div>
        </div>
        <button type="submit" id="reset-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem;">Send Reset Link</button>
      </form>

      <div class="auth-footer-text" style="margin-top:1.5rem;">
        <a href="./login.html" class="form-link">← Back to Sign In</a>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="./js/firebase-config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
